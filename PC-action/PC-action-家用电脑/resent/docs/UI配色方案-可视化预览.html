<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎨 UI配色方案预览</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Microsoft YaHei', sans-serif;
            background: #1a1a2e;
            min-height: 100vh;
            padding: 40px 20px;
        }
        h1 {
            text-align: center;
            color: #fff;
            font-size: 32px;
            margin-bottom: 10px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            margin-bottom: 40px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 30px;
            max-width: 1600px;
            margin: 0 auto;
        }
        .card {
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            transition: transform 0.3s, box-shadow 0.3s;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }
        .card-num {
            background: rgba(255,255,255,0.1);
            color: #fff;
            padding: 8px 16px;
            font-size: 14px;
            display: inline-block;
            border-radius: 20px;
            margin: 15px;
        }
        .preview {
            padding: 20px;
        }
        .btn-sample {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: bold;
            cursor: pointer;
            margin: 5px;
            transition: all 0.2s;
        }
        .btn-sample:hover {
            transform: scale(1.05);
        }
        .btn-primary {
            background: var(--primary);
            color: var(--text);
        }
        .btn-secondary {
            background: var(--secondary);
            color: var(--text);
        }
        .btn-accent {
            background: var(--accent);
            color: #fff;
        }
        .input-sample {
            width: 100%;
            padding: 10px 14px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 14px;
            background: var(--input-bg);
            color: var(--text);
            margin-top: 10px;
        }
        .label-sample {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin: 3px;
        }
        .label-primary {
            background: var(--primary);
            color: var(--text);
        }
        .label-secondary {
            background: var(--secondary);
            color: var(--text);
        }
        .label-accent {
            background: var(--accent);
            color: #fff;
        }
        .record-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            border: none;
            background: var(--primary);
            color: var(--text);
            font-size: 24px;
            cursor: pointer;
            margin: 15px auto;
            display: block;
            box-shadow: 0 4px 15px var(--shadow);
            transition: all 0.3s;
        }
        .record-btn:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 25px var(--shadow);
        }
        .toggle {
            width: 50px;
            height: 26px;
            background: var(--border);
            border-radius: 13px;
            position: relative;
            cursor: pointer;
            margin: 10px 5px;
            display: inline-block;
        }
        .toggle::after {
            content: '';
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            position: absolute;
            top: 2px;
            left: 2px;
            transition: all 0.3s;
        }
        .toggle.active {
            background: var(--primary);
        }
        .toggle.active::after {
            left: 26px;
        }
        .slider-track {
            width: 100%;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            margin: 10px 0;
        }
        .slider-fill {
            width: 60%;
            height: 100%;
            background: var(--primary);
            border-radius: 3px;
        }
        .card-name {
            font-size: 18px;
            font-weight: bold;
            color: var(--text);
            margin-bottom: 8px;
        }
        .scene {
            font-size: 12px;
            color: var(--muted);
            margin-bottom: 15px;
        }
        .color-swatches {
            display: flex;
            gap: 8px;
            margin-top: 15px;
            flex-wrap: wrap;
        }
        .swatch {
            width: 32px;
            height: 32px;
            border-radius: 6px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.2);
        }
        .divider {
            height: 1px;
            background: var(--border);
            margin: 15px 0;
        }
        .nav-bar {
            background: var(--card);
            padding: 10px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            display: flex;
            gap: 15px;
            align-items: center;
        }
        .nav-item {
            padding: 8px 16px;
            border-radius: 6px;
            color: var(--muted);
            font-size: 14px;
            cursor: pointer;
        }
        .nav-item.active {
            background: var(--primary);
            color: var(--text);
        }
    </style>
</head>

        function isGradient(color) {
            return typeof color === 'string' && color.includes('gradient');
        }

        function getTextColor(bgColor) {
            if (isGradient(bgColor)) return '#FFFFFF';
            const hex = bgColor.replace('#', '');
            const r = parseInt(hex.substr(0, 2), 16);
            const g = parseInt(hex.substr(2, 2), 16);
            const b = parseInt(hex.substr(4, 2), 16);
            const brightness = (r * 299 + g * 587 + b * 114) / 1000;
            return brightness > 128 ? '#1D1D1F' : '#FFFFFF';
        }
